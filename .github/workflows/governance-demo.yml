name: Bounty-Hive Governance Demo

on:
  workflow_dispatch:
  push:

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Demo Repo
        uses: actions/checkout@v4

      - name: Checkout Private Bounty-Hive Repo
        uses: actions/checkout@v4
        with:
          repository: Lift3dL3g3nd/bounty-hive
          token: ${{ secrets.BOUNTYHIVE_TOKEN }}
          path: bounty-hive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bounty-Hive Engine
        run: |
          cd bounty-hive
          pip install -e .

      - name: Run Governance Demo
        run: |
          mkdir -p output
          python -m bounty_hive \
            --artifacts demo_artifacts \
            --policy policies \
            --output output

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: bounty-hive-output
          path: output/
